name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Quitamos el cache para evitar el error de permisos
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # Usamos --no-daemon para que no intente guardar cache en carpetas protegidas
      run: ./gradlew assembleDebug --no-daemon

    - name: Save APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenCode-App
        path: app/build/outputs/apk/debug/*.apk
